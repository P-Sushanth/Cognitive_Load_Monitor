<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Cognitive Load Monitor</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
    <div class="container">
        <header class="dashboard-header">
            <h2>Cognitive Load Dashboard</h2>
            <button id="logout-btn" class="logout-btn">Logout</button>
        </header>

        <div id="overload-alert" class="alert-box"></div>

        <div class="dashboard-grid">
            <!-- Sidebar (Column 1) -->
            <div class="sidebar">
                <div class="task-form-card" style="margin-top: 20px;">
                    <h3>Add Task</h3>
                    <form onsubmit="addTask(event)">
                        <div class="form-group">
                            <label>Task Name</label>
                            <input type="text" id="taskName" required>
                        </div>
                        <div class="form-group">
                            <label>Duration (mins)</label>
                            <input type="number" id="duration" min="1" required>
                        </div>
                        <div class="form-group">
                            <label>Cognitive Load (1-5)</label>
                            <div class="range-container">
                                <input type="range" id="loadLevel" min="1" max="5" value="3" step="0.1">
                                <span id="loadVal" class="range-val">3</span>
                            </div>
                        </div>
                        <button type="submit">Add Task</button>
                    </form>
                </div>

                <div class="task-form-card">
                    <!-- Calendar Widget -->
                    <div id="calendar-header"
                        style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                        <button onclick="changeMonth(-1)" style="width:auto; padding: 5px;">&lt;</button>
                        <h4 id="month-year" style="margin:0;">Month Year</h4>
                        <button onclick="changeMonth(1)" style="width:auto; padding: 5px;">&gt;</button>
                    </div>
                    <div id="calendar" class="calendar-grid"></div>
                    <button onclick="resetFilter()" style="margin-top: 10px; background: #333; font-size: 0.8rem;">Show
                        All Tasks</button>
                </div>



                <div class="task-list" id="task-list">
                    <!-- Tasks go here -->
                </div>
            </div>

            <!-- Analytics -->
            <div class="stats-container">
                <div class="chart-card">
                    <h3>Daily Load Trend (Last 7 Days)</h3>
                    <canvas id="dailyChart"></canvas>
                </div>
                <div class="chart-card">
                    <h3>Weekly Average Load</h3>
                    <canvas id="weeklyChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <!-- Edit Task Modal -->
    <div id="edit-modal" class="modal">
        <div class="modal-content">
            <h3>Edit Task</h3>
            <form id="edit-task-form">
                <input type="hidden" id="edit-taskId">
                <div class="form-group">
                    <label>Task Name</label>
                    <input type="text" id="edit-taskName" required>
                </div>
                <div class="form-group">
                    <label>Duration (mins)</label>
                    <input type="number" id="edit-duration" min="1" required>
                </div>
                <div class="form-group">
                    <label>Cognitive Load (1-5)</label>
                    <div class="range-container">
                        <input type="range" id="edit-loadLevel" min="1" max="5" value="3" step="0.1">
                        <span id="edit-loadVal" class="range-val">3</span>
                    </div>
                </div>
                <div style="display: flex; gap: 10px; margin-top: 20px;">
                    <button type="submit" style="flex: 1;">Save Changes</button>
                    <button type="button" onclick="closeEditModal()" style="flex: 1; background: #333;">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/dashboard.js"></script>
</body>

</html>
